name: CD

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: codemate-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Build, Push and Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_ACCESS_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            docker.io/${{ secrets.DOCKER_USERNAME }}/codemate:${{ github.sha }}
            docker.io/${{ secrets.DOCKER_USERNAME }}/codemate:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create production environment file
        shell: bash
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          CODEMATE_DB_PASSWORD: ${{ secrets.CODEMATE_DB_PASSWORD }}
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
          CODEMATE_JWT_SECRET: ${{ secrets.CODEMATE_JWT_SECRET }}
        run: |
          {
            printf 'DOCKER_IMAGE=docker.io/%s/codemate\n' "$DOCKER_USERNAME"
            printf 'IMAGE_TAG=%s\n' "$GITHUB_SHA"
            printf 'APP_PORT=8080\n'
            printf 'CODEMATE_DB_NAME=codemate\n'
            printf 'CODEMATE_DB_USERNAME=codemate\n'
            printf 'CODEMATE_DB_PASSWORD=%s\n' "$CODEMATE_DB_PASSWORD"
            printf 'CODEMATE_DB_USE_SSL=false\n'
            printf 'MYSQL_ROOT_PASSWORD=%s\n' "$MYSQL_ROOT_PASSWORD"
            printf 'CODEMATE_JWT_SECRET=%s\n' "$CODEMATE_JWT_SECRET"
            printf 'CODEMATE_JWT_ACCESS_TOKEN_VALIDITY_MILLISECONDS=3600000\n'
            printf 'CODEMATE_JWT_REFRESH_TOKEN_VALIDITY_MILLISECONDS=1209600000\n'
          } > .env.prod

      - name: Copy deployment files to EC2
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          source: "compose.prod.yaml,.env.prod"
          target: "~/codemate"

      - name: Deploy application on EC2
        uses: appleboy/ssh-action@v1
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_ACCESS_TOKEN: ${{ secrets.DOCKER_ACCESS_TOKEN }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          envs: DOCKER_USERNAME,DOCKER_ACCESS_TOKEN
          script_stop: true
          script: |
            set -eu
            cd ~/codemate
            chmod 600 .env.prod

            printf '%s' "$DOCKER_ACCESS_TOKEN" |
              docker login --username "$DOCKER_USERNAME" --password-stdin

            docker compose --env-file .env.prod -f compose.prod.yaml up -d --wait mysql
            docker compose --env-file .env.prod -f compose.prod.yaml pull app
            docker compose --env-file .env.prod -f compose.prod.yaml up -d --no-deps app

            for attempt in $(seq 1 24); do
              if curl --fail --silent http://localhost:8080/actuator/health |
                grep -q '"status":"UP"'; then
                docker image prune -f
                exit 0
              fi
              sleep 5
            done

            docker compose --env-file .env.prod -f compose.prod.yaml logs --tail=200 app
            exit 1
