spring.application.name=CodeMate

spring.profiles.default=h2

spring.jpa.open-in-view=false
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.highlight_sql=true

management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

codemate.jwt.secret=${CODEMATE_JWT_SECRET:Y29kZW1hdGUtand0LXNlY3JldC1rZXktZm9yLWxvY2FsLWRldmVsb3BtZW50}
codemate.jwt.access-token-validity-milliseconds=${CODEMATE_JWT_ACCESS_TOKEN_VALIDITY_MILLISECONDS:3600000}
codemate.jwt.refresh-token-validity-milliseconds=${CODEMATE_JWT_REFRESH_TOKEN_VALIDITY_MILLISECONDS:1209600000}

springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.operations-sorter=method
