spring.application.name=CodeMate

spring.datasource.url=jdbc:h2:mem:codemate;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.highlight_sql=true

codemate.jwt.secret=${CODEMATE_JWT_SECRET:Y29kZW1hdGUtand0LXNlY3JldC1rZXktZm9yLWxvY2FsLWRldmVsb3BtZW50}
codemate.jwt.access-token-validity-milliseconds=3600000
