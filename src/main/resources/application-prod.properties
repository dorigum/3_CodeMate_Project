spring.datasource.url=jdbc:mysql://${CODEMATE_DB_HOST}:${CODEMATE_DB_PORT:3306}/${CODEMATE_DB_NAME}?useSSL=${CODEMATE_DB_USE_SSL:true}&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${CODEMATE_DB_USERNAME}
spring.datasource.password=${CODEMATE_DB_PASSWORD}

spring.h2.console.enabled=false

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.highlight_sql=false

spring.flyway.locations=classpath:db/migration/mysql
spring.flyway.baseline-on-migrate=false

springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-stacktrace=never
server.error.include-exception=false

management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

codemate.jwt.secret=${CODEMATE_JWT_SECRET}

logging.level.root=INFO
logging.level.org.hibernate.SQL=OFF
logging.level.org.hibernate.orm.jdbc.bind=OFF
