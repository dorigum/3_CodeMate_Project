spring.datasource.url=jdbc:mysql://${CODEMATE_DB_HOST:localhost}:${CODEMATE_DB_PORT:3306}/${CODEMATE_DB_NAME:codemate}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${CODEMATE_DB_USERNAME:codemate}
spring.datasource.password=${CODEMATE_DB_PASSWORD}

spring.h2.console.enabled=false

spring.jpa.hibernate.ddl-auto=validate
spring.flyway.locations=classpath:db/migration/mysql

# Existing development databases are registered at V1 without recreating tables.
# Remove this option after every environment has a flyway_schema_history table.
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1
spring.flyway.baseline-description=Existing CodeMate schema
